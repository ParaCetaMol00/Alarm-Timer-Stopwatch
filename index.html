<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="index.css">
</head>
<body>
<div class="app">
  <!-- Ringing Overlay -->
  <div class="ring-overlay" id="ringOverlay">
    <div class="ring-pulse">⏰</div>
    <div class="ring-time" id="ringTime">12:00</div>
    <div class="ring-label" id="ringLabel">Alarm</div>
    <button class="ring-stop" onclick="stopAlarm()">Stop</button>
  </div>

  <!-- Modal: Add Alarm -->
  <div class="modal-overlay" id="alarmModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">Add Alarm</div>
      <div class="alarm-picker-wrap">
        <div class="alarm-picker-col" id="aHourCol">
          <div class="alarm-picker-highlight"></div>
          <div class="alarm-picker-inner" id="aHourInner"></div>
        </div>
        <div class="alarm-picker-sep">:</div>
        <div class="alarm-picker-col" id="aMinCol">
          <div class="alarm-picker-highlight"></div>
          <div class="alarm-picker-inner" id="aMinInner"></div>
        </div>
        <div class="ampm-col">
          <button class="ampm-opt selected" id="amAM" onclick="selectAMPM('AM')">AM</button>
          <button class="ampm-opt" id="amPM" onclick="selectAMPM('PM')">PM</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-btn save" onclick="saveAlarm()">Save</button>
      </div>
    </div>
  </div>

  <!-- Screens -->
  <div class="screens">
    <!-- STOPWATCH -->
    <div class="screen active" id="screen-sw">
      <div class="screen-title">Stopwatch</div>
      <div class="sw-view-toggle">
        <button class="sw-view-btn active" onclick="swSetView('digital')">Digital</button>
        <button class="sw-view-btn" onclick="swSetView('analog')">Analog</button>
      </div>

      <div id="sw-digital">
        <div id="sw-time">00:00<span id="sw-ms">.00</span></div>
      </div>
      <div id="sw-analog" style="display:none">
        <div class="analog-wrap">
          <canvas id="analog-canvas" width="280" height="280"></canvas>
        </div>
      </div>

      <div class="sw-controls">
        <button class="circ-btn gray2" id="swLapBtn" onclick="swLap()">Lap</button>
        <button class="circ-btn green" id="swStartBtn" onclick="swToggle()">Start</button>
      </div>

      <div class="sw-laps" id="swLapList"></div>
    </div>

    <!-- TIMER -->
    <div class="screen" id="screen-timer">
      <div class="screen-title">Timer</div>

      <div id="timerPickerView">
        <div class="timer-picker">
          <div style="display:flex;flex-direction:column;align-items:center">
            <div class="picker-col" id="tHourCol">
              <div class="picker-highlight"></div>
              <div class="picker-inner" id="tHourInner"></div>
            </div>
            <div class="picker-label">hours</div>
          </div>
          <div class="picker-sep" style="margin-bottom:20px">:</div>
          <div style="display:flex;flex-direction:column;align-items:center">
            <div class="picker-col" id="tMinCol">
              <div class="picker-highlight"></div>
              <div class="picker-inner" id="tMinInner"></div>
            </div>
            <div class="picker-label">min</div>
          </div>
          <div class="picker-sep" style="margin-bottom:20px">:</div>
          <div style="display:flex;flex-direction:column;align-items:center">
            <div class="picker-col" id="tSecCol">
              <div class="picker-highlight"></div>
              <div class="picker-inner" id="tSecInner"></div>
            </div>
            <div class="picker-label">sec</div>
          </div>
        </div>
        <div class="timer-controls">
          <button class="circ-btn gray2" onclick="timerCancel()">Cancel</button>
          <button class="circ-btn green" onclick="timerStart()">Start</button>
        </div>
      </div>

      <div id="timerRunView" style="display:none">
        <div class="timer-display-wrap" style="height:180px">
          <svg class="timer-ring-svg" width="180" height="180" viewBox="0 0 180 180">
            <circle cx="90" cy="90" r="82" fill="none" stroke="var(--surface2)" stroke-width="6"/>
            <circle id="timer-ring-progress" cx="90" cy="90" r="82" fill="none"
              stroke="var(--accent)" stroke-width="6"
              stroke-linecap="round"
              stroke-dasharray="515"
              stroke-dashoffset="0"/>
          </svg>
          <div id="timer-time">00:00</div>
        </div>
        <div class="timer-controls">
          <button class="circ-btn gray2" onclick="timerCancel()">Cancel</button>
          <button class="circ-btn orange" id="timerPauseBtn" onclick="timerPause()">Pause</button>
        </div>
      </div>

      <div class="recents-title" style="margin-top:8px">Recents</div>
      <div class="recents-list" id="recentsList">
        <div class="empty-state">No recent timers</div>
      </div>
    </div>

    <!-- ALARM -->
    <div class="screen" id="screen-alarm">
      <div class="alarm-add-row">
        <div class="screen-title" style="margin-bottom:0">Alarm</div>
        <button class="circ-btn orange" style="width:36px;height:36px;font-size:22px;border-radius:50%" onclick="openModal()">+</button>
      </div>
      <div class="alarm-list" id="alarmList">
        <div class="empty-state">No alarms set</div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="nav">
    <button class="nav-btn active" onclick="navigate('sw')" id="nav-sw">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2.5"/><path d="M9 3h6"/><path d="M19.5 7l-1-1"/>
      </svg>
      <span class="nav-label">Stopwatch</span>
    </button>
    <button class="nav-btn" onclick="navigate('timer')" id="nav-timer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/><path d="M12 6v6l4 2"/>
      </svg>
      <span class="nav-label">Timer</span>
    </button>
    <button class="nav-btn" onclick="navigate('alarm')" id="nav-alarm">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        <path d="M4 2 2 4"/><path d="M20 2l2 2"/>
      </svg>
      <span class="nav-label">Alarm</span>
    </button>
  </nav>
</div>


<script src="index.js"></script>
</body>
</html>
