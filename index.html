<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

:root {
  --bg: #0a0a0a;
  --surface: #161616;
  --surface2: #1e1e1e;
  --surface3: #2a2a2a;
  --border: rgba(255,255,255,0.08);
  --text: #f5f5f5;
  --muted: #888;
  --muted2: #555;
  --accent: #ff6b2b;
  --accent2: #ff9a5c;
  --green: #34c759;
  --red: #ff3b30;
  --blue: #0a84ff;
  --font: 'Outfit', sans-serif;
}

html,body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  overflow: hidden;
  user-select: none;
}

/* ── APP SHELL ── */
.app {
  width: 100%;
  max-width: 430px;
  height: 100vh;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* ── SCREENS ── */
.screens {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.screen {
  position: absolute;
  inset: 0;
  padding: 60px 24px 20px;
  overflow-y: auto;
  opacity: 0;
  transform: translateX(30px);
  transition: opacity 0.3s cubic-bezier(0.4,0,0.2,1), transform 0.3s cubic-bezier(0.4,0,0.2,1);
  pointer-events: none;
  scrollbar-width: none;
}
.screen::-webkit-scrollbar { display: none; }
.screen.active {
  opacity: 1;
  transform: translateX(0);
  pointer-events: all;
}

.screen-title {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 32px;
  color: var(--text);
}

/* ── BOTTOM NAV ── */
.nav {
  display: flex;
  background: rgba(22,22,22,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 8px 0 env(safe-area-inset-bottom, 8px);
  gap: 0;
  z-index: 100;
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 6px 4px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted2);
  transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 26px; height: 26px; }
.nav-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.02em;
}

/* ── CIRCLE BUTTON ── */
.circ-btn {
  width: 78px; height: 78px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  font-family: var(--font);
  font-size: 17px;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s, filter 0.15s;
  flex-shrink: 0;
}
.circ-btn:active { transform: scale(0.93); }
.circ-btn.green { background: rgba(52,199,89,0.18); color: var(--green); }
.circ-btn.red   { background: rgba(255,59,48,0.18);  color: var(--red); }
.circ-btn.orange{ background: rgba(255,107,43,0.18); color: var(--accent); }
.circ-btn.gray  { background: var(--surface2); color: var(--text); }
.circ-btn.gray2 { background: var(--surface3); color: var(--muted); }

/* ════════════════════════════════
   STOPWATCH
════════════════════════════════ */
#sw-time {
  text-align: center;
  font-size: 80px;
  font-weight: 200;
  letter-spacing: -3px;
  line-height: 1;
  margin: 0 0 8px;
  font-variant-numeric: tabular-nums;
  color: var(--text);
}
#sw-ms {
  font-size: 40px;
  color: var(--muted);
  font-weight: 200;
}
.sw-view-toggle {
  display: flex;
  background: var(--surface2);
  border-radius: 12px;
  padding: 3px;
  margin-bottom: 28px;
  gap: 3px;
}
.sw-view-btn {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 9px;
  background: none;
  color: var(--muted);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.sw-view-btn.active {
  background: var(--surface3);
  color: var(--text);
}

/* Analog clock face */
.analog-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 28px;
}
#analog-canvas {
  border-radius: 50%;
}

.sw-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}
.sw-laps {
  background: var(--surface);
  border-radius: 16px;
  overflow: hidden;
}
.sw-lap-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  font-size: 15px;
  animation: fadeSlideIn 0.25s ease both;
}
.sw-lap-row:last-child { border-bottom: none; }
.sw-lap-row.best  { color: var(--green); }
.sw-lap-row.worst { color: var(--red); }
@keyframes fadeSlideIn {
  from { opacity:0; transform:translateY(-8px); }
  to   { opacity:1; transform:translateY(0); }
}
.lap-num { color: var(--muted); font-size: 14px; }

/* ════════════════════════════════
   TIMER
════════════════════════════════ */
.timer-display-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 28px;
  position: relative;
}
.timer-ring-svg {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
}
#timer-time {
  font-size: 76px;
  font-weight: 200;
  letter-spacing: -3px;
  font-variant-numeric: tabular-nums;
  text-align: center;
  line-height: 180px;
  position: relative;
  z-index: 1;
}
.timer-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
}
.timer-picker {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 4px;
  margin-bottom: 28px;
}
.picker-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  height: 156px;
  overflow: hidden;
  position: relative;
}
.picker-col::before,
.picker-col::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 40px;
  z-index: 2;
  pointer-events: none;
}
.picker-col::before { top: 0; background: linear-gradient(to bottom, var(--bg) 0%, transparent 100%); }
.picker-col::after  { bottom: 0; background: linear-gradient(to top, var(--bg) 0%, transparent 100%); }
.picker-inner {
  display: flex;
  flex-direction: column;
  gap: 0;
  transition: transform 0.2s cubic-bezier(0.4,0,0.2,1);
  cursor: ns-resize;
  position: relative;
  z-index: 3;
}
.picker-item {
  height: 52px;
  width: 68px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  font-weight: 200;
  color: var(--muted2);
  transition: color 0.2s, font-size 0.2s;
  font-variant-numeric: tabular-nums;
}
.picker-item.selected {
  color: var(--text);
  font-size: 42px;
}
.picker-sep {
  font-size: 36px;
  font-weight: 200;
  color: var(--muted2);
  padding-bottom: 6px;
}
.picker-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-align: center;
  margin-top: 4px;
  text-transform: uppercase;
}
.picker-highlight {
  position: absolute;
  top: 50%; left: 4px; right: 4px;
  height: 52px;
  transform: translateY(-50%);
  background: var(--surface2);
  border-radius: 10px;
  pointer-events: none;
  z-index: 1;
}

/* Recents */
.recents-title {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 14px;
  color: var(--text);
}
.recents-list { background: var(--surface); border-radius: 16px; overflow: hidden; }
.recent-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
.recent-row:last-child { border-bottom: none; }
.recent-row:active { background: var(--surface2); }
.recent-time { font-size: 17px; font-weight: 400; }
.recent-use {
  font-size: 13px;
  color: var(--accent);
  font-weight: 500;
}

/* ════════════════════════════════
   ALARM
════════════════════════════════ */
.alarm-add-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}
.alarm-list { background: var(--surface); border-radius: 16px; overflow: hidden; }
.alarm-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  animation: fadeSlideIn 0.25s ease both;
}
.alarm-row:last-child { border-bottom: none; }
.alarm-time-big {
  font-size: 42px;
  font-weight: 200;
  font-variant-numeric: tabular-nums;
  letter-spacing: -1px;
  line-height: 1;
}
.alarm-ampm {
  font-size: 18px;
  color: var(--muted);
  font-weight: 300;
  margin-left: 4px;
}
.alarm-label { font-size: 13px; color: var(--muted); margin-top: 2px; }
.alarm-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
.alarm-delete {
  background: none; border: none; cursor: pointer;
  color: var(--red); font-size: 13px; font-family: var(--font);
}

/* Toggle */
.toggle {
  width: 52px; height: 30px;
  border-radius: 15px;
  background: var(--surface3);
  position: relative;
  cursor: pointer;
  transition: background 0.25s;
  border: none;
  flex-shrink: 0;
}
.toggle.on { background: var(--green); }
.toggle::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: white;
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
.toggle.on::after { transform: translateX(22px); }

/* Add alarm modal */
.modal-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal-sheet {
  width: 100%;
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  padding: 20px 24px 40px;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
}
.modal-overlay.show .modal-sheet { transform: translateY(0); }
.modal-handle {
  width: 36px; height: 4px;
  background: var(--surface3);
  border-radius: 2px;
  margin: 0 auto 20px;
}
.modal-title {
  font-size: 18px;
  font-weight: 600;
  text-align: center;
  margin-bottom: 20px;
}
.modal-actions {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
}
.modal-btn {
  background: none;
  border: none;
  font-family: var(--font);
  font-size: 17px;
  cursor: pointer;
  padding: 4px 8px;
}
.modal-btn.cancel { color: var(--muted); }
.modal-btn.save   { color: var(--accent); font-weight: 600; }

/* Time picker for alarm */
.alarm-picker-wrap {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 2px;
}
.alarm-picker-col {
  height: 156px;
  overflow: hidden;
  position: relative;
  flex: 0 0 70px;
}
.alarm-picker-col::before,
.alarm-picker-col::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 40px;
  z-index: 2;
  pointer-events: none;
}
.alarm-picker-col::before { top:0; background:linear-gradient(to bottom,var(--surface) 0%,transparent 100%); }
.alarm-picker-col::after  { bottom:0; background:linear-gradient(to top,var(--surface) 0%,transparent 100%); }
.alarm-picker-inner {
  cursor: ns-resize;
  transition: transform 0.15s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  z-index: 3;
}
.alarm-picker-item {
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  font-weight: 200;
  color: var(--muted2);
  font-variant-numeric: tabular-nums;
  transition: color 0.15s;
}
.alarm-picker-item.selected { color: var(--text); font-size: 36px; }
.alarm-picker-highlight {
  position: absolute;
  top: 50%; left: 2px; right: 2px;
  height: 52px;
  transform: translateY(-50%);
  background: var(--surface2);
  border-radius: 8px;
  pointer-events: none;
  z-index: 1;
}
.alarm-picker-sep {
  font-size: 32px;
  font-weight: 200;
  padding-bottom: 8px;
  color: var(--muted);
}
.ampm-col {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-left: 8px;
}
.ampm-opt {
  padding: 8px 14px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  color: var(--muted);
  background: none;
  border: 1px solid var(--border);
  font-family: var(--font);
  transition: background 0.2s, color 0.2s;
}
.ampm-opt.selected { background: var(--accent); color: white; border-color: var(--accent); }

/* ── RINGING OVERLAY ── */
.ring-overlay {
  position: absolute;
  inset: 0;
  background: var(--bg);
  z-index: 500;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
}
.ring-overlay.show { opacity: 1; pointer-events: all; }
.ring-pulse {
  width: 160px; height: 160px;
  border-radius: 50%;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 60px;
  animation: ringPulse 1.2s ease-in-out infinite;
}
@keyframes ringPulse {
  0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,107,43,0.5); }
  50% { transform: scale(1.08); box-shadow: 0 0 0 30px rgba(255,107,43,0); }
}
.ring-time { font-size: 64px; font-weight: 200; letter-spacing: -2px; }
.ring-label { font-size: 20px; color: var(--muted); }
.ring-stop {
  background: var(--red);
  color: white;
  border: none;
  border-radius: 50px;
  padding: 18px 48px;
  font-family: var(--font);
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 16px;
}

/* Timer ring progress */
#timer-ring-progress {
  transition: stroke-dashoffset 1s linear;
  transform-origin: center;
  transform: rotate(-90deg);
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 15px;
}
</style>
</head>
<body>
<div class="app">
  <!-- Ringing Overlay -->
  <div class="ring-overlay" id="ringOverlay">
    <div class="ring-pulse">⏰</div>
    <div class="ring-time" id="ringTime">12:00</div>
    <div class="ring-label" id="ringLabel">Alarm</div>
    <button class="ring-stop" onclick="stopAlarm()">Stop</button>
  </div>

  <!-- Modal: Add Alarm -->
  <div class="modal-overlay" id="alarmModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">Add Alarm</div>
      <div class="alarm-picker-wrap">
        <div class="alarm-picker-col" id="aHourCol">
          <div class="alarm-picker-highlight"></div>
          <div class="alarm-picker-inner" id="aHourInner"></div>
        </div>
        <div class="alarm-picker-sep">:</div>
        <div class="alarm-picker-col" id="aMinCol">
          <div class="alarm-picker-highlight"></div>
          <div class="alarm-picker-inner" id="aMinInner"></div>
        </div>
        <div class="ampm-col">
          <button class="ampm-opt selected" id="amAM" onclick="selectAMPM('AM')">AM</button>
          <button class="ampm-opt" id="amPM" onclick="selectAMPM('PM')">PM</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-btn save" onclick="saveAlarm()">Save</button>
      </div>
    </div>
  </div>

  <!-- Screens -->
  <div class="screens">
    <!-- STOPWATCH -->
    <div class="screen active" id="screen-sw">
      <div class="screen-title">Stopwatch</div>
      <div class="sw-view-toggle">
        <button class="sw-view-btn active" onclick="swSetView('digital')">Digital</button>
        <button class="sw-view-btn" onclick="swSetView('analog')">Analog</button>
      </div>

      <div id="sw-digital">
        <div id="sw-time">00:00<span id="sw-ms">.00</span></div>
      </div>
      <div id="sw-analog" style="display:none">
        <div class="analog-wrap">
          <canvas id="analog-canvas" width="280" height="280"></canvas>
        </div>
      </div>

      <div class="sw-controls">
        <button class="circ-btn gray2" id="swLapBtn" onclick="swLap()">Lap</button>
        <button class="circ-btn green" id="swStartBtn" onclick="swToggle()">Start</button>
      </div>

      <div class="sw-laps" id="swLapList"></div>
    </div>

    <!-- TIMER -->
    <div class="screen" id="screen-timer">
      <div class="screen-title">Timer</div>

      <div id="timerPickerView">
        <div class="timer-picker">
          <div style="display:flex;flex-direction:column;align-items:center">
            <div class="picker-col" id="tHourCol">
              <div class="picker-highlight"></div>
              <div class="picker-inner" id="tHourInner"></div>
            </div>
            <div class="picker-label">hours</div>
          </div>
          <div class="picker-sep" style="margin-bottom:20px">:</div>
          <div style="display:flex;flex-direction:column;align-items:center">
            <div class="picker-col" id="tMinCol">
              <div class="picker-highlight"></div>
              <div class="picker-inner" id="tMinInner"></div>
            </div>
            <div class="picker-label">min</div>
          </div>
          <div class="picker-sep" style="margin-bottom:20px">:</div>
          <div style="display:flex;flex-direction:column;align-items:center">
            <div class="picker-col" id="tSecCol">
              <div class="picker-highlight"></div>
              <div class="picker-inner" id="tSecInner"></div>
            </div>
            <div class="picker-label">sec</div>
          </div>
        </div>
        <div class="timer-controls">
          <button class="circ-btn gray2" onclick="timerCancel()">Cancel</button>
          <button class="circ-btn green" onclick="timerStart()">Start</button>
        </div>
      </div>

      <div id="timerRunView" style="display:none">
        <div class="timer-display-wrap" style="height:180px">
          <svg class="timer-ring-svg" width="180" height="180" viewBox="0 0 180 180">
            <circle cx="90" cy="90" r="82" fill="none" stroke="var(--surface2)" stroke-width="6"/>
            <circle id="timer-ring-progress" cx="90" cy="90" r="82" fill="none"
              stroke="var(--accent)" stroke-width="6"
              stroke-linecap="round"
              stroke-dasharray="515"
              stroke-dashoffset="0"/>
          </svg>
          <div id="timer-time">00:00</div>
        </div>
        <div class="timer-controls">
          <button class="circ-btn gray2" onclick="timerCancel()">Cancel</button>
          <button class="circ-btn orange" id="timerPauseBtn" onclick="timerPause()">Pause</button>
        </div>
      </div>

      <div class="recents-title" style="margin-top:8px">Recents</div>
      <div class="recents-list" id="recentsList">
        <div class="empty-state">No recent timers</div>
      </div>
    </div>

    <!-- ALARM -->
    <div class="screen" id="screen-alarm">
      <div class="alarm-add-row">
        <div class="screen-title" style="margin-bottom:0">Alarm</div>
        <button class="circ-btn orange" style="width:36px;height:36px;font-size:22px;border-radius:50%" onclick="openModal()">+</button>
      </div>
      <div class="alarm-list" id="alarmList">
        <div class="empty-state">No alarms set</div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="nav">
    <button class="nav-btn active" onclick="navigate('sw')" id="nav-sw">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2.5"/><path d="M9 3h6"/><path d="M19.5 7l-1-1"/>
      </svg>
      <span class="nav-label">Stopwatch</span>
    </button>
    <button class="nav-btn" onclick="navigate('timer')" id="nav-timer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/><path d="M12 6v6l4 2"/>
      </svg>
      <span class="nav-label">Timer</span>
    </button>
    <button class="nav-btn" onclick="navigate('alarm')" id="nav-alarm">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        <path d="M4 2 2 4"/><path d="M20 2l2 2"/>
      </svg>
      <span class="nav-label">Alarm</span>
    </button>
  </nav>
</div>

<script>
// ════════════════════════════════
// NAVIGATION
// ════════════════════════════════
function navigate(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');
}

// ════════════════════════════════
// STOPWATCH
// ════════════════════════════════
let swRunning = false, swElapsed = 0, swStart = 0, swRaf = null;
let swLapTimes = [], swLastLap = 0;
let swView = 'digital';

function swSetView(v) {
  swView = v;
  document.querySelectorAll('.sw-view-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0&&v==='digital')||(i===1&&v==='analog'));
  });
  document.getElementById('sw-digital').style.display = v==='digital' ? 'block' : 'none';
  document.getElementById('sw-analog').style.display  = v==='analog'  ? 'block' : 'none';
}

function swToggle() {
  if (!swRunning) {
    swStart = performance.now() - swElapsed;
    swRunning = true;
    document.getElementById('swStartBtn').textContent = 'Stop';
    document.getElementById('swStartBtn').className = 'circ-btn red';
    document.getElementById('swLapBtn').textContent = 'Lap';
    document.getElementById('swLapBtn').className = 'circ-btn gray';
    swRaf = requestAnimationFrame(swTick);
  } else {
    swRunning = false;
    cancelAnimationFrame(swRaf);
    document.getElementById('swStartBtn').textContent = 'Start';
    document.getElementById('swStartBtn').className = 'circ-btn green';
    document.getElementById('swLapBtn').textContent = 'Reset';
    document.getElementById('swLapBtn').className = 'circ-btn gray2';
  }
}

function swTick() {
  swElapsed = performance.now() - swStart;
  swRenderTime();
  if (swView === 'analog') drawAnalog();
  swRaf = requestAnimationFrame(swTick);
}

function swRenderTime() {
  const t = swElapsed;
  const ms = Math.floor((t % 1000) / 10);
  const s  = Math.floor(t / 1000) % 60;
  const m  = Math.floor(t / 60000) % 60;
  const h  = Math.floor(t / 3600000);
  let main = h > 0
    ? `${pad(h)}:${pad(m)}:${pad(s)}`
    : `${pad(m)}:${pad(s)}`;
  document.getElementById('sw-time').innerHTML =
    `${main}<span id="sw-ms">.${pad(ms)}</span>`;
}

function swLap() {
  if (!swRunning) { swReset(); return; }
  const lapTime = swElapsed - swLastLap;
  swLastLap = swElapsed;
  swLapTimes.unshift({ n: swLapTimes.length + 1, t: lapTime });
  renderLaps();
}

function swReset() {
  swElapsed = 0; swLastLap = 0; swLapTimes = [];
  document.getElementById('sw-time').innerHTML = `00:00<span id="sw-ms">.00</span>`;
  document.getElementById('swLapBtn').textContent = 'Lap';
  document.getElementById('swLapBtn').className = 'circ-btn gray2';
  document.getElementById('swLapList').innerHTML = '';
  if (swView === 'analog') drawAnalog();
}

function renderLaps() {
  if (!swLapTimes.length) return;
  const times = swLapTimes.map(l => l.t);
  const best  = Math.min(...times);
  const worst = Math.max(...times);
  document.getElementById('swLapList').innerHTML = swLapTimes.map((l,i) => {
    const cls = times.length > 1 ? (l.t === best ? 'best' : l.t === worst ? 'worst' : '') : '';
    return `<div class="sw-lap-row ${cls}">
      <span class="lap-num">Lap ${l.n}</span>
      <span>${fmtMs(l.t)}</span>
    </div>`;
  }).join('');
}

function fmtMs(ms) {
  const s  = Math.floor(ms/1000)%60;
  const m  = Math.floor(ms/60000)%60;
  const cs = Math.floor((ms%1000)/10);
  return `${pad(m)}:${pad(s)}.${pad(cs)}`;
}

// Analog clock
function drawAnalog() {
  const c = document.getElementById('analog-canvas');
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height, cx = W/2, cy = H/2, r = W/2 - 10;
  ctx.clearRect(0,0,W,H);

  // Face
  ctx.beginPath();
  ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle = '#161616';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Ticks
  for (let i=0;i<60;i++) {
    const a = (i/60)*Math.PI*2 - Math.PI/2;
    const isMaj = i%5===0;
    const len = isMaj ? 14 : 7;
    const ri = r - 4;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*(ri-len), cy+Math.sin(a)*(ri-len));
    ctx.lineTo(cx+Math.cos(a)*ri, cy+Math.sin(a)*ri);
    ctx.strokeStyle = isMaj ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = isMaj ? 2 : 1;
    ctx.stroke();
  }

  const t = swElapsed;
  const ms_val = (t%1000)/1000;
  const sec = (Math.floor(t/1000)%60) + ms_val;
  const min = (Math.floor(t/60000)%60) + sec/60;
  const hr  = (Math.floor(t/3600000)%12) + min/60;

  // Hour hand
  drawHand(ctx,cx,cy, (hr/12)*Math.PI*2 - Math.PI/2, r*0.5, 5, '#f5f5f5');
  // Minute hand
  drawHand(ctx,cx,cy, (min/60)*Math.PI*2 - Math.PI/2, r*0.72, 3, '#f5f5f5');
  // Second hand
  drawHand(ctx,cx,cy, (sec/60)*Math.PI*2 - Math.PI/2, r*0.85, 1.5, '#ff6b2b');

  // Center
  ctx.beginPath();
  ctx.arc(cx,cy,5,0,Math.PI*2);
  ctx.fillStyle = '#ff6b2b';
  ctx.fill();
}

function drawHand(ctx,cx,cy,angle,length,width,color) {
  ctx.beginPath();
  ctx.moveTo(cx - Math.cos(angle)*length*0.2, cy - Math.sin(angle)*length*0.2);
  ctx.lineTo(cx + Math.cos(angle)*length, cy + Math.sin(angle)*length);
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.stroke();
}

// Init analog
drawAnalog();

// ════════════════════════════════
// TIMER PICKER
// ════════════════════════════════
let tHour=0, tMin=5, tSec=0;

function buildTimerPickers() {
  buildPicker('tHourInner', 24, tHour, v => { tHour=v; });
  buildPicker('tMinInner',  60, tMin,  v => { tMin=v; });
  buildPicker('tSecInner',  60, tSec,  v => { tSec=v; });
}

function buildPicker(innerId, count, selected, onChange) {
  const inner = document.getElementById(innerId);
  // Clone the col to strip all previously attached event listeners
  const oldCol = inner.parentElement;
  const col = oldCol.cloneNode(true);
  oldCol.parentElement.replaceChild(col, oldCol);
  const freshInner = col.querySelector('.picker-inner') || col.querySelector('[id]');
  // Re-get inner by id after clone
  const innerEl = document.getElementById(innerId);

  const itemH = 52;
  const colH  = 156;
  const centerOff = Math.floor((colH - itemH) / 2);
  const pad2  = v => String(v).padStart(2,'0');

  innerEl.innerHTML =
    Array.from({length:count},(_,i)=>`<div class="picker-item${i===selected?' selected':''}">${pad2(i)}</div>`).join('');

  let startY=0, startOffset=0, currentIdx=selected;
  const getOffset = i => centerOff - (i * itemH);
  let offset = getOffset(selected);
  innerEl.style.transform = `translateY(${offset}px)`;

  function setIndex(i) {
    i = Math.max(0, Math.min(count-1, i));
    currentIdx = i;
    offset = getOffset(i);
    innerEl.style.transform = `translateY(${offset}px)`;
    innerEl.querySelectorAll('.picker-item').forEach((el, idx) => {
      el.classList.toggle('selected', idx === i);
    });
    onChange(i);
  }

  col.addEventListener('wheel', e => {
    e.preventDefault();
    setIndex(currentIdx + (e.deltaY > 0 ? 1 : -1));
  }, {passive:false});

  col.addEventListener('touchstart', e => { startY=e.touches[0].clientY; startOffset=offset; }, {passive:true});
  col.addEventListener('touchmove', e => {
    const dy = e.touches[0].clientY - startY;
    setIndex(Math.round((centerOff - startOffset - dy) / itemH));
  }, {passive:true});
  col.addEventListener('mousedown', e => {
    startY=e.clientY; startOffset=offset;
    const onMove = e2 => {
      const dy=e2.clientY-startY;
      setIndex(Math.round((centerOff-startOffset-dy)/itemH));
    };
    const onUp = () => { removeEventListener('mousemove',onMove); removeEventListener('mouseup',onUp); };
    addEventListener('mousemove',onMove); addEventListener('mouseup',onUp);
  });
}

buildTimerPickers();

// TIMER LOGIC
let timerRunning=false, timerTotal=0, timerRemain=0, timerStart2=0, timerRaf=null, timerCircum=515;
let timerRecents=[];

function timerStart() {
  timerTotal = (tHour*3600 + tMin*60 + tSec)*1000;
  if(!timerTotal) return;
  timerRemain = timerTotal;
  timerStart2 = performance.now();
  timerRunning = true;
  document.getElementById('timerPickerView').style.display='none';
  document.getElementById('timerRunView').style.display='block';
  document.getElementById('timerPauseBtn').textContent='Pause';
  document.getElementById('timerPauseBtn').className='circ-btn orange';
  timerRaf = requestAnimationFrame(timerTick);
  // Add to recents
  const label = fmtTimerLabel(tHour, tMin, tSec);
  if(!timerRecents.includes(label)) {
    timerRecents.unshift(label);
    if(timerRecents.length>5) timerRecents.pop();
    renderRecents();
  }
}

function timerTick() {
  const elapsed = performance.now() - timerStart2;
  timerRemain = Math.max(0, timerTotal - elapsed);
  const s = Math.ceil(timerRemain/1000);
  const m = Math.floor(s/60)%60;
  const h = Math.floor(s/3600);
  const sec = s%60;
  document.getElementById('timer-time').textContent =
    h>0 ? `${pad(h)}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
  const pct = timerRemain/timerTotal;
  document.getElementById('timer-ring-progress').style.strokeDashoffset =
    timerCircum * (1-pct);
  if(timerRemain <= 0) {
    timerDone(); return;
  }
  timerRaf = requestAnimationFrame(timerTick);
}

function timerDone() {
  cancelAnimationFrame(timerRaf);
  timerRunning=false;
  document.getElementById('timer-time').textContent='00:00';
  document.getElementById('timerPauseBtn').textContent='Restart';
  document.getElementById('timerPauseBtn').className='circ-btn green';
  document.getElementById('timer-ring-progress').style.stroke='var(--red)';
  setTimeout(()=>document.getElementById('timer-ring-progress').style.stroke='var(--accent)',2000);
  // Play repeating beep until user taps Restart or Cancel
  startBeep();
}

function timerPause() {
  if(timerRemain<=0) { stopBeep(); timerStart(); return; }
  if(timerRunning) {
    timerRunning=false;
    cancelAnimationFrame(timerRaf);
    timerTotal=timerRemain;
    document.getElementById('timerPauseBtn').textContent='Resume';
    document.getElementById('timerPauseBtn').className='circ-btn green';
  } else {
    timerRunning=true;
    timerStart2=performance.now();
    document.getElementById('timerPauseBtn').textContent='Pause';
    document.getElementById('timerPauseBtn').className='circ-btn orange';
    timerRaf=requestAnimationFrame(timerTick);
  }
}

function timerCancel() {
  cancelAnimationFrame(timerRaf);
  timerRunning=false;
  stopBeep();
  document.getElementById('timerPickerView').style.display='block';
  document.getElementById('timerRunView').style.display='none';
  document.getElementById('timer-ring-progress').style.strokeDashoffset=0;
  document.getElementById('timer-ring-progress').style.stroke='var(--accent)';
}

function fmtTimerLabel(h,m,s) {
  if(h) return `${h}h ${m}m`;
  if(m && s) return `${m}m ${s}s`;
  if(m) return `${m} min`;
  return `${s} sec`;
}

function renderRecents() {
  const el = document.getElementById('recentsList');
  if(!timerRecents.length) { el.innerHTML='<div class="empty-state">No recent timers</div>'; return; }
  el.innerHTML = timerRecents.map(r=>`
    <div class="recent-row" onclick="loadRecent('${r}')">
      <span class="recent-time">${r}</span>
      <span class="recent-use">Use</span>
    </div>
  `).join('');
}

function loadRecent(label) {
  // Parse label back to hms
  let h=0,m=0,s=0;
  const hm = label.match(/(\d+)h/); if(hm) h=+hm[1];
  const mm = label.match(/(\d+)m/); if(mm) m=+mm[1];
  const sm = label.match(/(\d+)\s*s/); if(sm) s=+sm[1];
  if(label.endsWith('min')) m=parseInt(label);
  if(label.endsWith('sec')) s=parseInt(label);
  tHour=h; tMin=m||0; tSec=s||0;
  buildTimerPickers();
  timerCancel();
}

// ════════════════════════════════
// ALARM PICKER
// ════════════════════════════════
let aHour=7, aMin=0, aAMPM='AM';

function buildAlarmPickers() {
  buildAlarmPicker('aHourInner', 12, aHour-1, v => { aHour=v+1; });
  buildAlarmPicker('aMinInner',  60, aMin,    v => { aMin=v; });
}

function buildAlarmPicker(innerId, count, selected, onChange) {
  const oldCol = document.getElementById(innerId).parentElement;
  const col = oldCol.cloneNode(true);
  oldCol.parentElement.replaceChild(col, oldCol);

  const innerEl = document.getElementById(innerId);
  const itemH = 52;
  const colH  = 156;
  const centerOff = Math.floor((colH - itemH) / 2);
  const isHour = innerId.includes('Hour');

  innerEl.innerHTML =
    Array.from({length:count},(_,i)=>`<div class="alarm-picker-item${i===selected?' selected':''}">${String(isHour?i+1:i).padStart(2,'0')}</div>`).join('');

  let startY=0, startOffset=0, currentIdx=selected;
  const getOff = i => centerOff - (i * itemH);
  let offset = getOff(selected);
  innerEl.style.transform = `translateY(${offset}px)`;

  function setIdx(i) {
    i = Math.max(0, Math.min(count-1, i));
    currentIdx=i; offset=getOff(i);
    innerEl.style.transform=`translateY(${offset}px)`;
    innerEl.querySelectorAll('.alarm-picker-item').forEach((el,idx)=>{
      el.classList.toggle('selected', idx === i);
    });
    onChange(i);
  }

  col.addEventListener('wheel',e=>{e.preventDefault();setIdx(currentIdx+(e.deltaY>0?1:-1));},{passive:false});
  col.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;startOffset=offset;},{passive:true});
  col.addEventListener('touchmove',e=>{setIdx(Math.round((centerOff-startOffset-(e.touches[0].clientY-startY))/itemH));},{passive:true});
  col.addEventListener('mousedown',e=>{
    startY=e.clientY;startOffset=offset;
    const onMove=e2=>setIdx(Math.round((centerOff-startOffset-(e2.clientY-startY))/itemH));
    const onUp=()=>{removeEventListener('mousemove',onMove);removeEventListener('mouseup',onUp);};
    addEventListener('mousemove',onMove);addEventListener('mouseup',onUp);
  });
}

buildAlarmPickers();

function selectAMPM(v) {
  aAMPM=v;
  document.getElementById('amAM').classList.toggle('selected',v==='AM');
  document.getElementById('amPM').classList.toggle('selected',v==='PM');
}

function openModal() {
  document.getElementById('alarmModal').classList.add('show');
}
function closeModal() {
  document.getElementById('alarmModal').classList.remove('show');
}

let alarms = [];
let alarmCheckInterval = null;

function saveAlarm() {
  const h = aHour;
  const m = aMin;
  const ampm = aAMPM;
  const display = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  alarms.push({ h, m, ampm, display, on: true, id: Date.now() });
  renderAlarms();
  closeModal();
  if(!alarmCheckInterval) alarmCheckInterval = setInterval(checkAlarms, 1000);
}

function renderAlarms() {
  const el = document.getElementById('alarmList');
  if(!alarms.length) { el.innerHTML='<div class="empty-state">No alarms set</div>'; return; }
  el.innerHTML = alarms.map(a=>`
    <div class="alarm-row">
      <div>
        <div class="alarm-time-big">${a.display}<span class="alarm-ampm">${a.ampm}</span></div>
        <div class="alarm-label">Alarm</div>
      </div>
      <div class="alarm-right">
        <button class="toggle ${a.on?'on':''}" onclick="toggleAlarm(${a.id})" id="tog-${a.id}"></button>
        <button class="alarm-delete" onclick="deleteAlarm(${a.id})">Delete</button>
      </div>
    </div>
  `).join('');
}

function toggleAlarm(id) {
  const a = alarms.find(x=>x.id===id);
  if(a) { a.on=!a.on; renderAlarms(); }
}

function deleteAlarm(id) {
  alarms = alarms.filter(x=>x.id!==id);
  renderAlarms();
}

let firedAlarmKeys = new Set();

function checkAlarms() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  const key = `${h12}:${m}:${ampm}`;

  alarms.forEach(a => {
    const aKey = `${a.id}:${key}`;
    if (a.on && a.h === h12 && a.m === m && a.ampm === ampm && !firedAlarmKeys.has(aKey)) {
      firedAlarmKeys.add(aKey);
      triggerAlarm(a);
    }
  });

  // Clear fired keys when the minute changes so alarms can fire again next day
  if (now.getSeconds() === 0) {
    // Only clear keys from previous minutes
    firedAlarmKeys.forEach(k => {
      if (!k.endsWith(key)) firedAlarmKeys.delete(k);
    });
  }
}

let alarmAudioCtx = null;
let alarmMasterGain = null;
let alarmBeepInterval = null;

function getAudioCtx() {
  if (!alarmAudioCtx || alarmAudioCtx.state === 'closed') {
    alarmAudioCtx = new AudioContext();
    alarmMasterGain = alarmAudioCtx.createGain();
    alarmMasterGain.gain.value = 1;
    alarmMasterGain.connect(alarmAudioCtx.destination);
  }
  return alarmAudioCtx;
}

function playAlarmBeep() {
  try {
    const ctx2 = getAudioCtx();
    [[880, 0], [1100, 0.18]].forEach(([freq, delay]) => {
      const osc = ctx2.createOscillator();
      const gain = ctx2.createGain();
      osc.connect(gain);
      gain.connect(alarmMasterGain); // route through master, not directly to destination
      osc.frequency.value = freq;
      osc.type = 'sine';
      const t = ctx2.currentTime + delay;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.35, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.start(t);
      osc.stop(t + 0.15);
    });
  } catch(e){}
}

function stopBeep() {
  clearInterval(alarmBeepInterval);
  alarmBeepInterval = null;
  if (alarmMasterGain && alarmAudioCtx) {
    const now = alarmAudioCtx.currentTime;
    alarmMasterGain.gain.cancelScheduledValues(now);
    alarmMasterGain.gain.setValueAtTime(0, now);
  }
  if (alarmAudioCtx) {
    const ctx = alarmAudioCtx;
    alarmAudioCtx = null;
    alarmMasterGain = null;
    setTimeout(() => { try { ctx.close(); } catch(e){} }, 100);
  }
}

function startBeep() {
  // Mute and destroy the old context synchronously before creating a new one
  if (alarmMasterGain && alarmAudioCtx) {
    const now = alarmAudioCtx.currentTime;
    alarmMasterGain.gain.cancelScheduledValues(now);
    alarmMasterGain.gain.setValueAtTime(0, now);
  }
  clearInterval(alarmBeepInterval);
  alarmBeepInterval = null;
  if (alarmAudioCtx) {
    const old = alarmAudioCtx;
    alarmAudioCtx = null;
    alarmMasterGain = null;
    try { old.close(); } catch(e){}
  }
  // Now start fresh with no delay
  playAlarmBeep();
  alarmBeepInterval = setInterval(playAlarmBeep, 1200);
}

function triggerAlarm(a) {
  document.getElementById('ringTime').textContent = a.display;
  document.getElementById('ringLabel').textContent = 'Alarm';
  document.getElementById('ringOverlay').classList.add('show');
  startBeep();
}

function stopAlarm() {
  document.getElementById('ringOverlay').classList.remove('show');
  stopBeep();
}

// ════════════════════════════════
// UTILS
// ════════════════════════════════
function pad(n) { return String(Math.floor(n)).padStart(2,'0'); }
</script>
